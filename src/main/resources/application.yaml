spring:
  application:
    name: BuildSy
    description: This is the code generation platform with multiple feature.

  datasource:
    url: jdbc:postgresql://localhost:5432/BuildSy
    username: postgres
    password: HmH$3F34
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openai/gpt-4o-mini
          temperature: 0.7

jwt:
  secret-key: ${JWT_SECRET_KEY:myJwtSecretKey1234567890}

stripe:
  api:
    secret: ${STRIPE_SECRET_KEY:}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:}

client:
  url: http://localhost:8080
